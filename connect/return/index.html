<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PFANDIGO Connect Return</title>
  <link rel="stylesheet" href="/connect/connect-bridge.css">
</head>
<body>
  <main class="bridge-card">
    <h1>Weiterleitung zur PFANDIGO App...</h1>
    <p>Wenn deine PFANDIGO App installiert ist, wird sie jetzt geöffnet.</p>
    <a id="open-app-btn" class="open-app-btn" href="pfandigo://wallet/connect-return">Zurück zur PFANDIGO App</a>
    <p class="hint">Falls sich die App nicht öffnet, bitte PFANDIGO manuell öffnen.</p>
  </main>

  <script src="/connect/deep-link-migration.js"></script>
  <script>
    (function redirectToApp() {
      var btn = document.getElementById("open-app-btn");
      var links = window.PFANDIGO_DEEP_LINKS.redirectWithFallback("wallet/connect-return");
      btn.href = links.primary;
    })();
  </script>
</body>
</html>
